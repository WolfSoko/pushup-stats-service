# yaml-language-server: $schema=https://storage.googleapis.com/coderabbit_public_assets/schema.v2.json
reviews:
  pre_merge_checks:
    docstrings:
      # AGENTS.md mandates comment-light code ("default to no comments"), so a
      # high docstring-coverage gate blocks valid PRs that intentionally omit
      # docstrings on self-explanatory code (incl. trivial spec helpers). Keep
      # the check informational (warning) at a low threshold instead of
      # excluding test files from review entirely.
      mode: warning
      threshold: 50
