x-logging: &default-logging
  driver: json-file
  options:
    max-size: 10m
    max-file: '3'

x-defaults: &service-defaults
  restart: unless-stopped
  init: true
  logging: *default-logging

services:
  ssr:
    <<: *service-defaults
    build:
      context: .
      dockerfile: Dockerfile
      target: ssr-runner
    command: ['node', 'dist/web/server/server.mjs']
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${HOST_PORT:-8787}
      NX_CLOUD_ACCESS_TOKEN: ${NX_CLOUD_ACCESS_TOKEN}
    expose:
      - '8787'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get(`http://127.0.0.1:$${process.env.PORT}/de`,r=>process.exit((r.statusCode||0)<500?0:1)).on('error',()=>process.exit(1));",
        ]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s
