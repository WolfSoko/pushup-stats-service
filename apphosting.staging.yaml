# Staging settings for App Hosting Backend (on Cloud Run).
# Used for PR preview deployments to pushup-stats-staging-867b7.
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  maxInstances: 1
  concurrency: 80

env:
  - variable: NG_ALLOWED_HOSTS
    # `*.hosted.app` covers Firebase App Hosting URLs; `*.run.app` covers the
    # Cloud Run revision/traffic-tag URLs that App Hosting routes through
    # internally during rolling deploys (Angular SSR's SSRF guard otherwise
    # rejects them with a 400). Angular's `isHostAllowed` only treats `*.`
    # prefixes as wildcards — a bare leading dot is matched literally and
    # would NOT cover the revision URLs.
    value: '*.hosted.app,*.run.app'
    availability:
      - RUNTIME

  # Match prod's heap bump — staging builds the same web bundle and
  # OOMs at the same point without it.
  - variable: NODE_OPTIONS
    value: '--max-old-space-size=6144'
    availability:
      - BUILD

  # Match prod: cap prerender workers so the ~8 GB App Hosting builder
  # doesn't thrash during the ~2400-route prerender (see apphosting.yaml).
  - variable: NG_BUILD_MAX_WORKERS
    value: '2'
    availability:
      - BUILD

  # Override apphosting.yaml's `secret: SENTRY_AUTH_TOKEN` binding with a plain
  # placeholder value. App Hosting MERGES this file onto apphosting.yaml by
  # variable name, and base-only entries persist — so merely omitting the secret
  # here does NOT drop it. The inherited `secret:` reference resolves against a
  # secret that doesn't exist in pushup-stats-staging-867b7 and fails the rollout
  # at bind time, before the build runs (the upload script's no-op-when-unset
  # guard can't catch a bind-time failure). Redefining the same variable as a
  # plain value removes the secret resolution. The value is never read — staging's
  # buildCommand omits `pnpm sentry:sourcemaps` — and can't be empty because App
  # Hosting reserves "" and rejects it as invalid formatting.
  - variable: SENTRY_AUTH_TOKEN
    value: 'unused-on-staging'
    availability:
      - BUILD

scripts:
  # No Sentry source-map upload here (unlike apphosting.yaml): staging skips the
  # debug-ID upload (see the SENTRY_AUTH_TOKEN override above for why the secret
  # is replaced with a placeholder value rather than just omitted).
  buildCommand: pnpm nx run web:build -c staging
  runCommand: node dist/web/server/server.mjs
