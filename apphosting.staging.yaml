# Staging settings for App Hosting Backend (on Cloud Run).
# Used for PR preview deployments to pushup-stats-staging-867b7.
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  maxInstances: 1
  concurrency: 80

env:
  - variable: NG_ALLOWED_HOSTS
    # `*.hosted.app` covers Firebase App Hosting URLs; `*.run.app` covers the
    # Cloud Run revision/traffic-tag URLs that App Hosting routes through
    # internally during rolling deploys (Angular SSR's SSRF guard otherwise
    # rejects them with a 400). Angular's `isHostAllowed` only treats `*.`
    # prefixes as wildcards — a bare leading dot is matched literally and
    # would NOT cover the revision URLs.
    value: '*.hosted.app,*.run.app'
    availability:
      - RUNTIME

  # Match prod's heap bump — staging builds the same web bundle and
  # OOMs at the same point without it.
  - variable: NODE_OPTIONS
    value: '--max-old-space-size=6144'
    availability:
      - BUILD

scripts:
  # No Sentry source-map upload here (unlike apphosting.yaml): the staging GCP
  # project has no SENTRY_AUTH_TOKEN secret, and a `secret:` reference to a
  # missing secret fails the rollout at bind time — before the build even runs —
  # so it can't be guarded by the upload script's no-op-when-unset check.
  buildCommand: pnpm nx run web:build -c staging
  runCommand: node dist/web/server/server.mjs
