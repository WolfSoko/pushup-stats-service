# Firebase deployment – gated by CI.
# Deploys: Hosting, Cloud Functions, Firestore rules & indexes.
# App Hosting (SSR/Cloud Run) is deployed separately via apphosting.yaml.
# The deploy branch is only updated after CI succeeds on main
# (see promote-to-deploy job in ci.yml).
name: Deploy Firebase (Hosting + Functions + Firestore) on merge
on:
  push:
    branches:
      - deploy
  workflow_dispatch:
env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN_WRITE }}
  # More heap for Angular SSR build + Playwright webServer in CI.
  NODE_OPTIONS: --max-old-space-size=6144
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      # Use corepack to install the exact pnpm version from package.json's
      # `packageManager` field. See ci.yml for background on why we avoid
      # pnpm/action-setup@v6.
      - name: Enable corepack
        env:
          COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
        run: |
          corepack enable
          pnpm --version

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build web app
        run: pnpm nx run web:build -c production
      - name: Build Cloud Functions
        run: pnpm nx run cloud-functions:build
      # Nx esbuild emits package.json + pnpm-lock.yaml into functions-dist with
      # firebase-functions etc. left external. firebase-tools resolves the SDK
      # from this dir, so node_modules must exist here before deploy.
      # --ignore-workspace keeps pnpm scoped to the generated lockfile instead
      # of treating functions-dist as part of the root workspace.
      - name: Install Cloud Functions runtime dependencies
        working-directory: data-store/functions-dist
        run: pnpm install --frozen-lockfile --ignore-workspace
      - name: Upload source maps to Sentry
        # Scope the secret to this step only — script no-ops if the env is empty,
        # so we don't need an explicit `if:` guard.
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: pnpm sentry:sourcemaps
      - name: Prepare Hosting artifact
        run: |
          rm -rf data-store/hosting-public
          mkdir -p data-store/hosting-public
          cp -R dist/web/browser/. data-store/hosting-public/
          find data-store/hosting-public -type f -name 'index.csr.html' -print0 | while IFS= read -r -d '' f; do
            cp "$f" "${f%index.csr.html}index.html"
          done
      - name: Authenticate Firebase CLI
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PUSHUP_STATS }}' > "$RUNNER_TEMP/firebase-sa.json"
      - name: Deploy Cloud Functions + Firestore rules & indexes
        run: pnpm exec firebase deploy --only functions,firestore --project pushup-stats
        working-directory: data-store
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
      # Pinned to the v0.10.0 commit (latest release as of 2026-05) per
      # GitHub's third-party-action hardening guidance — same pin as the
      # PR-preview workflow so prod + preview stay on the same revision.
      - uses: FirebaseExtended/action-hosting-deploy@e2eda2e106cfa35cdbcf4ac9ddaf6c4756df2c8c # v0.10.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PUSHUP_STATS }}
          channelId: live
          projectId: pushup-stats
          entryPoint: data-store
