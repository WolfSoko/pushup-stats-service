# Firebase Hosting deployment – gated by CI.
# Runs only after the "CI" workflow succeeds on main.
name: Deploy to Firebase Hosting on merge
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN_WRITE }}
  # More heap for Angular SSR build + Playwright webServer in CI.
  NODE_OPTIONS: --max-old-space-size=6144
jobs:
  build_and_deploy:
    # Only deploy when CI succeeded (not on failure/cancellation)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build web app
        run: pnpm nx run web:build -c production
      - name: Prepare Hosting artifact
        run: |
          rm -rf data-store/hosting-public
          mkdir -p data-store/hosting-public
          cp -R dist/web/browser/. data-store/hosting-public/
          find data-store/hosting-public -type f -name 'index.csr.html' -print0 | while IFS= read -r -d '' f; do
            cp "$f" "${f%index.csr.html}index.html"
          done
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PUSHUP_STATS }}
          channelId: live
          projectId: pushup-stats
          entryPoint: data-store
