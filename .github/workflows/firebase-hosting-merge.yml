# Firebase deployment – gated by CI.
# Deploys: Hosting, Cloud Functions, Firestore rules & indexes.
# App Hosting (SSR/Cloud Run) is deployed separately via apphosting.yaml.
# The deploy branch is only updated after CI succeeds on main
# (see promote-to-deploy job in ci.yml).
name: Deploy Firebase (Hosting + Functions + Firestore) on merge
on:
  push:
    branches:
      - deploy
  workflow_dispatch:
env:
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN_WRITE }}
  # More heap for Angular SSR build + Playwright webServer in CI.
  NODE_OPTIONS: --max-old-space-size=6144
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # id-token: write lets the runner mint a GitHub OIDC token, which
    # Workload Identity Federation exchanges for short-lived GCP credentials
    # (no long-lived service-account key in repo secrets).
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      # Use corepack to install the exact pnpm version from package.json's
      # `packageManager` field. See ci.yml for background on why we avoid
      # pnpm/action-setup@v6.
      - name: Enable corepack
        env:
          COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
        run: |
          corepack enable
          pnpm --version

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build web app
        run: pnpm nx run web:build -c production
      - name: Build Cloud Functions
        run: pnpm nx run cloud-functions:build
      # Nx esbuild emits package.json + pnpm-lock.yaml into functions-dist with
      # firebase-functions etc. left external. firebase-tools resolves the SDK
      # from this dir, so node_modules must exist here before deploy.
      # --ignore-workspace keeps pnpm scoped to the generated lockfile instead
      # of treating functions-dist as part of the root workspace.
      # --ignore-scripts skips postinstalls (e.g. @firebase/util, protobufjs)
      # which under CI=true would otherwise fail with ERR_PNPM_IGNORED_BUILDS;
      # we only need module resolution here — Cloud Build reinstalls in GCF.
      - name: Install Cloud Functions runtime dependencies
        working-directory: data-store/functions-dist
        run: pnpm install --frozen-lockfile --ignore-workspace --ignore-scripts
      - name: Upload source maps to Sentry
        # Scope the secret to this step only — script no-ops if the env is empty,
        # so we don't need an explicit `if:` guard.
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: pnpm sentry:sourcemaps
      - name: Prepare Hosting artifact
        run: |
          rm -rf data-store/hosting-public
          mkdir -p data-store/hosting-public
          cp -R dist/web/browser/. data-store/hosting-public/
          find data-store/hosting-public -type f -name 'index.csr.html' -print0 | while IFS= read -r -d '' f; do
            cp "$f" "${f%index.csr.html}index.html"
          done
      # WIF still provides gcloud's ADC (and is kept for any GCP CLI steps), but
      # firebase-tools itself authenticates via FIREBASE_TOKEN below — its own
      # WIF/STS exchange fails on the GitHub runners with a transport "Premature
      # close" (firebase/firebase-tools#10726), which it reports as the generic
      # "Failed to authenticate". vars.WIF_PROVIDER / vars.WIF_DEPLOY_SA are set by
      # infra/setup-wif.sh. Pinned to the v3.0.0 commit per GitHub's third-party-
      # action hardening guidance.
      - name: Authenticate to Google Cloud (keyless, WIF)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: pushup-stats
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_DEPLOY_SA }}
      # firebase-tools authenticates with FIREBASE_TOKEN (a `firebase login:ci`
      # refresh token in repo secrets). It refreshes via oauth2.googleapis.com,
      # bypassing the broken WIF/STS path entirely. requireAuth checks FIREBASE_TOKEN
      # before ADC, so the credential file the auth step exported is not used here.
      # Retry to absorb transient deploy/network hiccups; the final attempt fails fast.
      - name: Deploy Hosting + Cloud Functions + Firestore rules & indexes
        working-directory: data-store
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
        run: |
          for attempt in 1 2 3 4; do
            pnpm exec firebase deploy --only hosting,functions,firestore --project pushup-stats && exit 0
            if [ "$attempt" -lt 4 ]; then
              echo "::warning::firebase deploy attempt $attempt failed; retrying in 15s"
              sleep 15
            fi
          done
          echo "::error::firebase deploy failed after 4 attempts"
          exit 1
