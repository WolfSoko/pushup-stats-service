# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools
name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
env:
  # Für PRs nur Read-Token, für main Pushes Write-Token.
  # Bei Fork-PRs sind Secrets automatisch nicht verfügbar.
  NX_CLOUD_ACCESS_TOKEN: ${{ github.event_name == 'pull_request' && secrets.NX_CLOUD_ACCESS_TOKEN_READ || secrets.NX_CLOUD_ACCESS_TOKEN_WRITE }}
  # More heap for Angular SSR build + Playwright webServer in CI.
  NODE_OPTIONS: --max-old-space-size=6144
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build web app
        run: pnpm nx run web:build -c production
      - name: Prepare Hosting artifact
        run: |
          rm -rf data-store/hosting-public
          mkdir -p data-store/hosting-public
          cp -R dist/web/browser/. data-store/hosting-public/
          find data-store/hosting-public -type f -name 'index.csr.html' -print0 | while IFS= read -r -d '' f; do
            cp "$f" "${f%index.csr.html}index.html"
          done
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PUSHUP_STATS }}
          channelId: live
          projectId: pushup-stats
          entryPoint: data-store
