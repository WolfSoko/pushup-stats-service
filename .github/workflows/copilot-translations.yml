name: Copilot translations

# Daily sweep that hands every missing translation to the GitHub Copilot
# coding agent. Detection runs locally on the runner (cheap), and the
# work itself runs in a Copilot session that opens a PR back against
# main.
#
# Source of truth for what counts as a "gap":
#   - XLIFF: units in `web/src/locale/messages.<lang>.xlf` whose target
#     equals source AND segment state == "initial" (i.e. seeded by
#     `tools/src/sync-xliff-locales.mjs`, never touched).
#   - Blog: missing `content/blog/<folder>/<lang>.md`.
#   - Wiki: missing `content/wiki/pushup-types/<id>.<lang>.md`.
# See `tools/src/detect-translation-gaps.mjs` for the full rules.

on:
  workflow_dispatch:
    inputs:
      locales:
        description: 'Comma-separated locales to translate (default: all non-de)'
        required: false
        default: ''
      dry_run:
        description: 'Detect gaps only, do not dispatch Copilot'
        required: false
        type: boolean
        default: false
  schedule:
    # 06:00 UTC daily — runs against latest main.
    - cron: '0 6 * * *'

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  # Never two Copilot dispatches in flight against the same branch.
  group: copilot-translations
  cancel-in-progress: false

env:
  # Für PRs nur Read-Token, für main Pushes Write-Token.
  # Bei Fork-PRs sind Secrets automatisch nicht verfügbar.
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN_WRITE }}

jobs:
  dispatch-copilot:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Detection is read-only; no step in this job needs to push.
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Enable corepack
        env:
          COREPACK_ENABLE_DOWNLOAD_PROMPT: '0'
        run: |
          corepack enable
          pnpm --version

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-store-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Refresh the source XLIFF and seed fallback units so the detector
      # sees the current i18n surface, not a stale snapshot.
      - name: Extract i18n + seed fallback units
        run: |
          pnpm nx run web:extract-i18n
          node tools/src/sync-xliff-locales.mjs

      - name: Detect translation gaps
        id: detect
        env:
          INPUT_LOCALES: ${{ inputs.locales }}
        run: |
          mkdir -p .copilot-translations
          ARGS=(--report .copilot-translations/prompt.md \
                --summary .copilot-translations/summary.env \
                --json   .copilot-translations/gaps.json)
          if [ -n "$INPUT_LOCALES" ]; then
            ARGS+=(--locales "$INPUT_LOCALES")
          fi
          node tools/src/detect-translation-gaps.mjs "${ARGS[@]}"
          # Surface the summary env to subsequent steps.
          cat .copilot-translations/summary.env >> "$GITHUB_OUTPUT"
          {
            echo '## Translation gap summary'
            echo ''
            sed -n '1,40p' .copilot-translations/prompt.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload detection artifacts
        uses: actions/upload-artifact@v7
        with:
          name: copilot-translation-prompt
          path: .copilot-translations/

      - name: Skip — no gaps detected
        if: steps.detect.outputs.has_gaps != 'true'
        run: echo "All target locales are fully translated. Nothing to dispatch."

      - name: Skip — dry-run requested
        if: steps.detect.outputs.has_gaps == 'true' && inputs.dry_run == true
        run: |
          echo "Dry run: ${{ steps.detect.outputs.gap_count }} gap(s) detected, Copilot dispatch skipped."

      # Dispatch the Copilot coding agent by creating an issue assigned
      # to the `copilot-swe-agent` bot with an `agentAssignment` block.
      # Copilot then opens a PR back against `main` on a
      # `copilot/translations-*` branch and links it to the issue.
      #
      # Auth: requires a user PAT, not the default GITHUB_TOKEN —
      # the installation token issued to Actions does not see
      # `copilot-swe-agent` in `suggestedActors`, so dispatch silently
      # fails. We reuse DEPLOY_PUSH_TOKEN (already present in the repo).
      # The `GraphQL-Features` header is required while the assignment
      # API is in preview.
      - name: Dispatch GitHub Copilot
        if: steps.detect.outputs.has_gaps == 'true' && inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.DEPLOY_PUSH_TOKEN }}
          GAP_COUNT: ${{ steps.detect.outputs.gap_count }}
          XLIFF_COUNT: ${{ steps.detect.outputs.xliff_count }}
          BLOG_COUNT: ${{ steps.detect.outputs.blog_count }}
          WIKI_COUNT: ${{ steps.detect.outputs.wiki_count }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          PROMPT_FILE=.copilot-translations/prompt.md
          TITLE="chore(i18n): fill ${GAP_COUNT} missing translation(s)"
          BODY="$(cat "$PROMPT_FILE")"

          OWNER="${REPO%%/*}"
          NAME="${REPO##*/}"

          # Resolve the repository node id and the Copilot bot id in a
          # single GraphQL round-trip. `jq -er` exits non-zero on
          # null/missing so we fail fast with a clear error instead of
          # silently carrying "null" forward.
          LOOKUP="$(gh api graphql \
            -H "GraphQL-Features: issues_copilot_assignment_api_support,coding_agent_model_selection" \
            -f query='query($owner:String!,$name:String!){repository(owner:$owner,name:$name){id suggestedActors(capabilities:[CAN_BE_ASSIGNED],first:100){nodes{login ... on Bot {id}}}}}' \
            -f owner="$OWNER" -f name="$NAME")"

          REPO_ID="$(echo "$LOOKUP" | jq -er '.data.repository.id')"
          # Drop `-e` so an empty match doesn't trip `set -e` before
          # the explicit diagnostic below can print the lookup payload.
          # `// empty` keeps BOT_ID truly empty (not the string "null").
          BOT_ID="$(echo "$LOOKUP" | jq -r '
            (.data.repository.suggestedActors.nodes[]?
             | select(.login == "copilot-swe-agent")
             | .id) // empty')"

          if [ -z "$BOT_ID" ]; then
            echo "copilot-swe-agent not found in suggestedActors — is the Copilot coding agent enabled for this repo, and does GH_TOKEN have the right scopes?" >&2
            echo "Raw lookup response:" >&2
            echo "$LOOKUP" | jq . >&2
            exit 1
          fi

          # Step 1: Create the issue. `createIssue` doesn't accept bot
          # actors in `assigneeIds` (it silently drops them), so we
          # leave assignees empty here and use `replaceActorsForAssignable`
          # in step 2 to attach Copilot.
          CREATE="$(gh api graphql \
            -H "GraphQL-Features: issues_copilot_assignment_api_support,coding_agent_model_selection" \
            -f query='mutation($repoId:ID!,$title:String!,$body:String!){createIssue(input:{repositoryId:$repoId,title:$title,body:$body}){issue{id number url}}}' \
            -f repoId="$REPO_ID" \
            -f title="$TITLE" \
            -f body="$BODY")"

          if ! echo "$CREATE" | jq -e '(.errors // []) | length == 0' >/dev/null; then
            echo "createIssue GraphQL errors:" >&2
            echo "$CREATE" | jq -r '.errors' >&2
            exit 1
          fi
          ISSUE_ID="$(echo "$CREATE" | jq -er '.data.createIssue.issue.id')"
          NUMBER="$(echo "$CREATE" | jq -er '.data.createIssue.issue.number')"
          URL="$(echo "$CREATE" | jq -er '.data.createIssue.issue.url')"

          # Step 2: Attach the Copilot bot via the actor-assignment API.
          # This is the only path that accepts bot IDs and triggers the
          # coding agent session. Verify the bot ended up in the
          # assignee list — silent drops have bitten us twice already.
          ASSIGN="$(gh api graphql \
            -H "GraphQL-Features: issues_copilot_assignment_api_support,coding_agent_model_selection" \
            -f query='mutation($issueId:ID!,$botId:ID!){replaceActorsForAssignable(input:{assignableId:$issueId,actorIds:[$botId]}){assignable{... on Issue{assignees(first:10){nodes{login}}}}}}' \
            -f issueId="$ISSUE_ID" \
            -f botId="$BOT_ID")"

          if ! echo "$ASSIGN" | jq -e '(.errors // []) | length == 0' >/dev/null; then
            echo "replaceActorsForAssignable GraphQL errors:" >&2
            echo "$ASSIGN" | jq -r '.errors' >&2
            exit 1
          fi
          if ! echo "$ASSIGN" | jq -e '
            .data.replaceActorsForAssignable.assignable.assignees.nodes
            | map(.login) | index("Copilot") != null' >/dev/null; then
            echo "Copilot was not added to the assignee list after dispatch." >&2
            echo "Assign response:" >&2
            echo "$ASSIGN" | jq . >&2
            exit 1
          fi
          echo "Copilot issue #${NUMBER} dispatched: ${URL}"
          {
            echo "## Copilot dispatched"
            echo ""
            echo "- Gaps: ${GAP_COUNT} (xliff:${XLIFF_COUNT}, blog:${BLOG_COUNT}, wiki:${WIKI_COUNT})"
            echo "- Issue: ${URL}"
            echo "- PR will be opened by @copilot once the session starts."
          } >> "$GITHUB_STEP_SUMMARY"
