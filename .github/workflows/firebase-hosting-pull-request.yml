# Deploy PR preview to staging Firebase project.
# Deploys: Hosting preview, Cloud Functions, Firestore rules & indexes.
# Uses the staging Firebase project (pushup-stats-staging-867b7) so PRs
# never affect production data or functions.
name: Deploy to Firebase Staging on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
env:
  # Für PRs nur Read-Token, für main Pushes Write-Token.
  # Bei Fork-PRs sind Secrets automatisch nicht verfügbar.
  NX_CLOUD_ACCESS_TOKEN: >-
    ${{
      github.event.pull_request.head.repo.full_name == github.repository
        && secrets.NX_CLOUD_ACCESS_TOKEN_WRITE
      || secrets.NX_CLOUD_ACCESS_TOKEN_READ
    }}
  # More heap for Angular SSR build + Playwright webServer in CI.
  NODE_OPTIONS: --max-old-space-size=6144
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build web app (staging config)
        run: pnpm nx run web:build -c staging
      - name: Build Cloud Functions
        run: pnpm nx run cloud-functions:build
      - name: Prepare Hosting artifact
        run: |
          rm -rf data-store/hosting-public
          mkdir -p data-store/hosting-public
          cp -R dist/web/browser/. data-store/hosting-public/
          find data-store/hosting-public -type f -name 'index.csr.html' -print0 | while IFS= read -r -d '' f; do
            cp "$f" "${f%index.csr.html}index.html"
          done
      - name: Authenticate Firebase CLI
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_PUSHUP_STATS_STAGING }}' > "$RUNNER_TEMP/firebase-sa.json"
      - name: Deploy Cloud Functions + Firestore rules & indexes to staging
        run: pnpm exec firebase deploy --only functions,firestore --project pushup-stats-staging-867b7
        working-directory: data-store
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PUSHUP_STATS_STAGING }}
          projectId: pushup-stats-staging-867b7
          entryPoint: data-store
