name: Deploy SSR (Cloud Run) + Firebase Hosting

on:
  workflow_call:
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  PROJECT: web

jobs:
  deploy-ssr:
    name: Deploy Angular SSR to Cloud Run
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    outputs:
      cloud_run_url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build SSR app (Nx)
        run: npx nx build $PROJECT --configuration=production

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push SSR image
        id: image
        env:
          IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REGISTRY_REPO }}/pus-ssr:${{ github.sha }}
        run: |
          docker build --target ssr-runner -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Deploy Cloud Run service
        id: deploy
        env:
          IMAGE: ${{ steps.image.outputs.image }}
        run: |
          gcloud run deploy "${{ secrets.CLOUD_RUN_SERVICE }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ secrets.GCP_REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --image "$IMAGE" \
            --port 8080 \
            --cpu 1 \
            --memory 1Gi \
            --concurrency 40 \
            --min-instances 0 \
            --max-instances 10

          URL=$(gcloud run services describe "${{ secrets.CLOUD_RUN_SERVICE }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ secrets.GCP_REGION }}" \
            --format='value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"

  deploy-hosting:
    name: Deploy Firebase Hosting
    runs-on: ubuntu-latest
    needs: deploy-ssr
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build browser bundle (Nx)
        run: npx nx build $PROJECT --configuration=production

      - name: Setup Firebase service account
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT_JSON" > "$RUNNER_TEMP/firebase-sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-sa.json" >> "$GITHUB_ENV"

      - name: Install Firebase CLI
        run: npm i -g firebase-tools

      - name: Inject Cloud Run rewrite target
        run: |
          sed -i "s/__CLOUD_RUN_SERVICE__/${{ secrets.CLOUD_RUN_SERVICE }}/g" firebase.json
          sed -i "s/__GCP_REGION__/${{ secrets.GCP_REGION }}/g" firebase.json

      - name: Deploy hosting
        run: firebase deploy --only hosting --project "${{ secrets.FIREBASE_PROJECT_ID }}" --non-interactive

      - name: Deployment summary
        run: |
          echo "Cloud Run URL: ${{ needs.deploy-ssr.outputs.cloud_run_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Firebase project: ${{ secrets.FIREBASE_PROJECT_ID }}" >> "$GITHUB_STEP_SUMMARY"
