name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    env:
      # Für PRs nur Read-Token, für main Pushes Write-Token.
      # Bei Fork-PRs sind Secrets automatisch nicht verfügbar.
      NX_CLOUD_ACCESS_TOKEN: ${{ github.event_name == 'pull_request' && secrets.NX_CLOUD_ACCESS_TOKEN_READ || secrets.NX_CLOUD_ACCESS_TOKEN_WRITE }}
      # More heap for Angular SSR build + Playwright webServer in CI.
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - uses: nrwl/nx-set-shas@v4
      - name: Nx Cloud distributed run starten
        run: pnpm nx-cloud start-ci-run --distribute-on="4 linux-medium-js" --stop-agents-after="lint,test,build,e2e-ci"
      - name: Nx affected (lint + test + build)
        run: pnpm nx affected -t=lint,test,build -c=production --parallel=3
      - name: Nx affected e2e-ci (parallel)
        run: pnpm nx affected -t=e2e-ci --parallel=4
      - name: Nx fix-ci (always)
        if: always()
        run: pnpm nx fix-ci
