name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  lint-test-build:
    runs-on: ubuntu-latest
    env:
      # Für PRs nur Read-Token, für main Pushes Write-Token.
      # Bei Fork-PRs sind Secrets automatisch nicht verfügbar.
      NX_CLOUD_ACCESS_TOKEN: >-
        ${{
          github.event_name != 'pull_request'
            && secrets.NX_CLOUD_ACCESS_TOKEN_WRITE
          || github.event.pull_request.head.repo.full_name == github.repository
            && secrets.NX_CLOUD_ACCESS_TOKEN_WRITE
          || secrets.NX_CLOUD_ACCESS_TOKEN_READ
        }}
      # More heap for Angular SSR build + Playwright webServer in CI.
      NODE_OPTIONS: --max-old-space-size=6144
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          filter: tree:0
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - uses: nrwl/nx-set-shas@v5
      - name: Nx Cloud distributed run starten
        run: pnpm nx-cloud start-ci-run --distribute-on="4 linux-medium-js" --stop-agents-after="lint,test,build,e2e-ci"
      - name: Nx affected (lint + test + build)
        run: pnpm nx affected -t=lint,test,build -c=production --parallel=3
      - name: Nx affected e2e-ci (parallel)
        run: pnpm nx affected -t=e2e-ci --parallel=4
      - name: Nx fix-ci (always)
        if: always()
        run: pnpm nx fix-ci

  # After successful CI on main, fast-forward the deploy branch.
  # Firebase App Hosting watches this branch instead of main,
  # so it only deploys code that passed lint + test + build + e2e.
  promote-to-deploy:
    needs: lint-test-build
    if: github.ref == 'refs/heads/main'
    # A push failure here must not block the Firebase Hosting deploy
    # (which gates on the overall CI workflow conclusion).
    continue-on-error: true
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Use a PAT so the push triggers downstream workflows
          # (pushes with GITHUB_TOKEN don't trigger further workflows).
          token: ${{ secrets.DEPLOY_PUSH_TOKEN }}
      - name: Fast-forward deploy branch
        run: |
          git fetch origin deploy || true
          git push origin HEAD:refs/heads/deploy
