# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  maxInstances: 3
  concurrency: 80
  # cpu: 1
  # memoryMiB: 512

# Environment variables and secrets.
env:
  # Configure environment variables.
  # See https://firebase.google.com/docs/app-hosting/configure#user-defined-environment
  - variable: NG_ALLOWED_HOSTS
    # Angular SSR (`@angular/ssr`) rejects requests whose `Host` header isn't
    # in this list as an SSRF guard. Firebase App Hosting routes through Cloud
    # Run, so during rolling deploys traffic-tag URLs like
    # `t-<id>---pushup-stats-service-<hash>-<region>.a.run.app` reach the SSR
    # with that internal hostname.
    #
    # Angular only treats entries starting with `*.` as wildcards
    # (see `isHostAllowed` in `@angular/ssr`); `*.run.app` matches any
    # hostname ending in `.run.app`, including the random per-revision tags.
    value: 'pushup-stats-service--pushup-stats.europe-west4.hosted.app,pushup-stats.com,pushup-stats.de,*.run.app'
    availability:
      - RUNTIME

  # Sentry auth token for source map upload during App Hosting's build.
  # App Hosting builds independently from GitHub Actions, so the bundles served
  # at pushup-stats.com need their own debug-ID upload — otherwise Sentry can't
  # match runtime stack traces to source maps.
  #
  # Setup (one-time, requires gcloud + Firebase project owner role):
  #   gcloud secrets create SENTRY_AUTH_TOKEN --replication-policy=automatic
  #   echo -n "<token>" | gcloud secrets versions add SENTRY_AUTH_TOKEN --data-file=-
  #   firebase apphosting:secrets:grantaccess SENTRY_AUTH_TOKEN \
  #     --backend pushup-stats-service --project pushup-stats
  - variable: SENTRY_AUTH_TOKEN
    secret: SENTRY_AUTH_TOKEN
    availability:
      - BUILD

  # Nx Cloud read token so the App Hosting build can restore
  # `web:build:production` from the remote cache instead of rebuilding it.
  # CI seeds the cache on every main push (`nx affected -t build -c production`
  # with the write token), and App Hosting only builds commits that already
  # passed CI (the `deploy` branch is fast-forwarded post-CI), so every rollout
  # should be a cache hit — turning the ~16-min build that overwhelms the ~8 GB
  # builder into an artifact download. See docs/ci-cd.md.
  #
  # Setup (one-time, requires gcloud + Firebase project owner role; reuse the
  # read-only token stored as the NX_CLOUD_ACCESS_TOKEN_READ GitHub secret):
  #   gcloud secrets create NX_CLOUD_ACCESS_TOKEN --replication-policy=automatic
  #   echo -n "<read-only token>" | gcloud secrets versions add NX_CLOUD_ACCESS_TOKEN --data-file=-
  #   firebase apphosting:secrets:grantaccess NX_CLOUD_ACCESS_TOKEN \
  #     --backend pushup-stats-service --project pushup-stats
  - variable: NX_CLOUD_ACCESS_TOKEN
    secret: NX_CLOUD_ACCESS_TOKEN
    availability:
      - BUILD

  # Default Node heap (~2 GB) OOMs during the Angular SSR build's
  # Mark-Compact phase after bundle generation completes. GitHub Actions
  # already bumps to 6144 for the Firebase deploy workflows
  # (`.github/workflows/firebase-hosting-*.yml`); App Hosting needs the
  # same headroom or the production build fails after ~430 s.
  - variable: NODE_OPTIONS
    value: '--max-old-space-size=6144'
    availability:
      - BUILD

  # The App Hosting builder has ~8 GB RAM total; the main build process
  # needs the 6 GB heap above, and each prerender worker thread adds its
  # own V8 isolate on top. With the default 4 workers the ~2400-route
  # prerender thrashes into memory-pressure stalls late in the build —
  # single routes hang > 120 s and abort the whole build (see
  # docs/gotchas/build-and-tooling.md). Two workers keep peak memory
  # inside the machine.
  - variable: NG_BUILD_MAX_WORKERS
    value: '2'
    availability:
      - BUILD

# Grant access to secrets in Cloud Secret Manager.
# See https://firebase.google.com/docs/app-hosting/configure#secret-parameters
scripts:
  # Custom build: produce the Angular SSR artifact, then upload debug IDs +
  # source maps to Sentry. The Sentry script is a no-op if SENTRY_AUTH_TOKEN
  # is not bound, so the build still succeeds during initial bring-up.
  buildCommand: pnpm nx run web:build -c production && pnpm sentry:sourcemaps
  runCommand: node dist/web/server/server.mjs
