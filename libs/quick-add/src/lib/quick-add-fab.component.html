<div class="speed-dial">
  @if (fabState.open()) {
    <div class="dial-actions">
      @for (item of dialItems(); track $index) {
        @if (item.type === 'feedback') {
          <button
            mat-fab
            extended
            class="feedback-fab"
            aria-label="Feedback geben"
            i18n-aria-label="@@quickAdd.fab.feedbackAria"
            (click)="onOpenFeedback()"
          >
            <mat-icon>{{ item.icon }}</mat-icon>
            <span i18n="@@quickAdd.fab.feedback">Feedback</span>
          </button>
        } @else if (item.type === 'auto-count') {
          <button
            mat-fab
            extended
            class="auto-count-fab"
            aria-label="Liegestütze automatisch zählen"
            i18n-aria-label="@@quickAdd.fab.autoCountAria"
            (click)="onOpenAutoCount()"
          >
            <mat-icon>{{ item.icon }}</mat-icon>
            <span i18n="@@quickAdd.fab.autoCount">Auto‑Zählen</span>
          </button>
        } @else if (item.type === 'exercise-timer') {
          <button
            mat-fab
            extended
            class="exercise-timer-fab"
            aria-label="Halteübungs-Timer öffnen"
            i18n-aria-label="@@quickAdd.fab.exerciseTimerAria"
            (click)="onOpenExerciseTimer()"
          >
            <mat-icon>{{ item.icon }}</mat-icon>
            <span i18n="@@quickAdd.fab.exerciseTimer">Plank‑Timer</span>
          </button>
        } @else if (item.type === 'custom') {
          <button
            mat-fab
            extended
            class="custom-fab"
            aria-label="Eigenen Wert eingeben"
            i18n-aria-label="@@quickAdd.fab.customValueAria"
            (click)="onOpenDialog()"
          >
            <mat-icon>{{ item.icon }}</mat-icon>
            <span i18n="@@quickAdd.fab.customValue">Eigener Wert</span>
          </button>
        } @else if (item.type === 'goal') {
          <button
            mat-fab
            extended
            class="goal-fab"
            [disabled]="goalDisabled()"
            [attr.aria-label]="
              goalReached() ? goalReachedAria : fillToGoalAria(item.value)
            "
            (click)="onFillToGoal()"
          >
            <mat-icon>{{ item.icon }}</mat-icon>
            @if (goalReached()) {
              <span>{{ goalReachedLabel }}</span>
            } @else {
              <span i18n="@@quickAdd.fab.fillToGoal"
                >+{{ item.value }} bis zum Ziel</span
              >
            }
          </button>
        } @else {
          <button
            mat-fab
            extended
            class="quick-fab"
            [attr.aria-label]="repAriaLabel(item.value)"
            (click)="onQuickAdd(item.value)"
          >
            <mat-icon>{{ item.icon }}</mat-icon>
            <span i18n="@@quickAdd.fab.quickAddReps"
              >+{{ item.value }} Reps</span
            >
          </button>
        }
      }
    </div>
  }

  <button
    mat-fab
    color="primary"
    class="main-fab"
    [class.open]="fabState.open()"
    [attr.aria-expanded]="fabState.open()"
    [attr.aria-label]="fabState.open() ? closeAriaLabel : openAriaLabel"
    (click)="toggle()"
  >
    <mat-icon>add</mat-icon>
  </button>
</div>
