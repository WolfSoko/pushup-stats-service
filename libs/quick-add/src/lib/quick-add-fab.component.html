<div class="speed-dial">
  @if (fabState.open()) {
    <div class="dial-actions">
      @for (item of dialItems(); track $index) {
        @if (item.type === 'custom') {
          <div class="dial-row">
            <span class="dial-label" i18n="@@quickAdd.fab.customValue"
              >Eigener Wert</span
            >
            <button
              mat-mini-fab
              class="custom-mini-fab"
              aria-label="Eigenen Wert eingeben"
              i18n-aria-label="@@quickAdd.fab.customValueAria"
              (click)="onOpenDialog()"
            >
              <mat-icon>{{ item.icon }}</mat-icon>
            </button>
          </div>
        } @else {
          <div class="dial-row">
            <span class="dial-label">+{{ item.value }} Reps</span>
            <button
              mat-mini-fab
              class="quick-mini-fab"
              [attr.aria-label]="repAriaLabel(item.value)"
              (click)="onQuickAdd(item.value)"
            >
              <mat-icon>{{ item.icon }}</mat-icon>
            </button>
          </div>
        }
      }
    </div>
  }

  <button
    mat-fab
    color="primary"
    class="main-fab"
    [class.open]="fabState.open()"
    [attr.aria-expanded]="fabState.open()"
    [attr.aria-label]="fabState.open() ? closeAriaLabel : openAriaLabel"
    (click)="toggle()"
  >
    <mat-icon>add</mat-icon>
  </button>
</div>
