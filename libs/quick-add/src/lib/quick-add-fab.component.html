<div class="speed-dial">
  @if (fabState.open()) {
    <div class="dial-actions">
      @for (item of dialItems(); track $index) {
        @if (item.type === 'feedback') {
          <button
            mat-fab
            extended
            class="feedback-fab"
            aria-label="Feedback geben"
            i18n-aria-label="@@quickAdd.fab.feedbackAria"
            (click)="onOpenFeedback()"
          >
            <mat-icon>{{ item.icon }}</mat-icon>
            <span i18n="@@quickAdd.fab.feedback">Feedback</span>
          </button>
        } @else if (item.type === 'custom') {
          <button
            mat-fab
            extended
            class="custom-fab"
            aria-label="Eigenen Wert eingeben"
            i18n-aria-label="@@quickAdd.fab.customValueAria"
            (click)="onOpenDialog()"
          >
            <mat-icon>{{ item.icon }}</mat-icon>
            <span i18n="@@quickAdd.fab.customValue">Eigener Wert</span>
          </button>
        } @else {
          <button
            mat-fab
            extended
            class="quick-fab"
            [attr.aria-label]="repAriaLabel(item.value)"
            (click)="onQuickAdd(item.value)"
          >
            <mat-icon>{{ item.icon }}</mat-icon>
            <span i18n="@@quickAdd.fab.quickAddReps"
              >+{{ item.value }} Reps</span
            >
          </button>
        }
      }
    </div>
  }

  <button
    mat-fab
    color="primary"
    class="main-fab"
    [class.open]="fabState.open()"
    [attr.aria-expanded]="fabState.open()"
    [attr.aria-label]="fabState.open() ? closeAriaLabel : openAriaLabel"
    (click)="toggle()"
  >
    <mat-icon>add</mat-icon>
  </button>
</div>
