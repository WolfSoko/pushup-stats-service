<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-dark" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1A2747"/>
      <stop offset="1" stop-color="#0D1220"/>
    </linearGradient>
    <linearGradient id="bg-light" x1="0" y1="0" x2="1200" y2="720" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8F0FF"/>
      <stop offset="1" stop-color="#C5D5F5"/>
    </linearGradient>
    <style>
      .bg-fill { fill: url(#bg-dark); }
      .outer { fill: #111A30; stroke: #2F4678; }
      .header { fill: #22345F; }
      .subtitle { fill: #324E86; }
      .card { fill: #1A2848; stroke: #385A98; }
      .chart-bg { fill: #141F38; stroke: #2F4678; }
      .line { stroke: #7EA5FF; }
      .dot { fill: #9CC0FF; }
      .sidebar { fill: #141F38; stroke: #2F4678; }
      .sb-title { fill: #385A98; }
      .sb-item { fill: #2A426F; }
      .sb-box { fill: #22345F; }

      @media (prefers-color-scheme: light) {
        .bg-fill { fill: url(#bg-light); }
        .outer { fill: #F0F4FF; stroke: #A0B8E0; }
        .header { fill: #C8D8F8; }
        .subtitle { fill: #90AAD8; }
        .card { fill: #E4EEFF; stroke: #88AADC; }
        .chart-bg { fill: #EAF0FF; stroke: #A0B8E0; }
        .line { stroke: #2550C0; }
        .dot { fill: #3868D8; }
        .sidebar { fill: #EAF0FF; stroke: #A0B8E0; }
        .sb-title { fill: #6A90C8; }
        .sb-item { fill: #AABEDD; }
        .sb-box { fill: #C8D8F0; }
      }
    </style>
  </defs>

  <rect width="1200" height="720" rx="28" class="bg-fill"/>
  <rect x="28" y="28" width="1144" height="664" rx="22" class="outer" stroke-width="1"/>
  <rect x="60" y="72" width="280" height="42" rx="10" class="header"/>
  <rect x="60" y="130" width="220" height="18" rx="9" class="subtitle"/>

  <rect x="60" y="184" width="260" height="120" rx="16" class="card" stroke-width="1"/>
  <rect x="340" y="184" width="260" height="120" rx="16" class="card" stroke-width="1"/>
  <rect x="620" y="184" width="260" height="120" rx="16" class="card" stroke-width="1"/>

  <rect x="60" y="336" width="820" height="290" rx="18" class="chart-bg" stroke-width="1"/>
  <polyline points="110,560 210,520 300,545 390,465 490,500 580,430 690,470 790,405" class="line" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="790" cy="405" r="10" class="dot"/>

  <rect x="910" y="336" width="230" height="290" rx="18" class="sidebar" stroke-width="1"/>
  <rect x="940" y="372" width="170" height="18" rx="9" class="sb-title"/>
  <rect x="940" y="408" width="120" height="14" rx="7" class="sb-item"/>
  <rect x="940" y="438" width="170" height="14" rx="7" class="sb-item"/>
  <rect x="940" y="468" width="140" height="14" rx="7" class="sb-item"/>
  <rect x="940" y="508" width="170" height="68" rx="12" class="sb-box"/>
</svg>
