<svg width="320" height="160" viewBox="0 0 320 160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true">
  <defs>
    <linearGradient id="set-bar-dark" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3460C2"/>
      <stop offset="100%" stop-color="#7EA5FF"/>
    </linearGradient>
    <linearGradient id="set-bar-light" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3868D8"/>
      <stop offset="100%" stop-color="#90B4FF"/>
    </linearGradient>
    <style>
      .bg { fill: #0F1A33; }
      .card { fill: #1A2848; stroke: #2F4678; stroke-width: 1; }
      .label { fill: #C4D2F2; font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: 600; }
      .reps { fill: #ffffff; font-family: system-ui, sans-serif; font-size: 13px; font-weight: 700; }
      .total-label { fill: #93ADEA; font-family: system-ui, sans-serif; font-size: 9px; text-transform: uppercase; letter-spacing: 0.08em; }
      .total-value { fill: #ffffff; font-family: system-ui, sans-serif; font-size: 28px; font-weight: 800; }
      .bar { fill: url(#set-bar-dark); }
      .bar-bg { fill: #1F2D52; }

      @media (prefers-color-scheme: light) {
        .bg { fill: #F4F8FF; }
        .card { fill: #ffffff; stroke: #C0D0F0; }
        .label { fill: #334E80; }
        .reps { fill: #1E293B; }
        .total-label { fill: #3B82F6; }
        .total-value { fill: #1E293B; }
        .bar { fill: url(#set-bar-light); }
        .bar-bg { fill: #DBE5F8; }
      }
    </style>
  </defs>

  <rect width="320" height="160" rx="14" class="bg"/>
  <rect x="14" y="14" width="190" height="132" rx="10" class="card"/>

  <text x="28" y="36" class="label">Set 1</text>
  <rect x="28" y="44" width="138" height="10" rx="5" class="bar-bg"/>
  <rect x="28" y="44" width="120" height="10" rx="5" class="bar"/>
  <text x="172" y="53" class="reps">12</text>

  <text x="28" y="74" class="label">Set 2</text>
  <rect x="28" y="82" width="138" height="10" rx="5" class="bar-bg"/>
  <rect x="28" y="82" width="100" height="10" rx="5" class="bar"/>
  <text x="172" y="91" class="reps">10</text>

  <text x="28" y="112" class="label">Set 3</text>
  <rect x="28" y="120" width="138" height="10" rx="5" class="bar-bg"/>
  <rect x="28" y="120" width="80" height="10" rx="5" class="bar"/>
  <text x="172" y="129" class="reps">8</text>

  <rect x="216" y="14" width="90" height="132" rx="10" class="card"/>
  <text x="261" y="56" text-anchor="middle" class="total-label">Total</text>
  <text x="261" y="92" text-anchor="middle" class="total-value">30</text>
  <text x="261" y="116" text-anchor="middle" class="label">Reps</text>
</svg>
