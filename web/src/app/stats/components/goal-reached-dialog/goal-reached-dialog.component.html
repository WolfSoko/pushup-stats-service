<div
  #card
  class="goal-card"
  [class.is-snapping]="snapping()"
  data-testid="goal-reached-card"
>
  <button
    type="button"
    class="close-btn"
    data-testid="goal-reached-close"
    [attr.aria-label]="closeAriaLabel"
    (click)="onClose()"
  >
    <span aria-hidden="true" class="material-icons close-icon">close</span>
  </button>
  <div class="hero">
    <span aria-hidden="true" class="material-icons hero-icon">{{
      copy().icon
    }}</span>
  </div>
  <h2 [id]="data.titleId" class="title">{{ copy().title }}</h2>
  <p class="progress" data-testid="goal-reached-progress">
    {{ progressLabel() }}
    <span class="progress-suffix" i18n="@@goalReached.repsSuffix"
      >Liegestütze</span
    >
  </p>
  <p class="note">{{ copy().note }}</p>
  <div class="actions">
    <button
      type="button"
      class="snap-btn"
      data-testid="goal-reached-snap"
      [disabled]="snapping()"
      [attr.aria-label]="snapAriaLabel"
      (click)="onSnap()"
    >
      <span aria-hidden="true" class="material-icons snap-icon"
        >auto_awesome</span
      >
      <span>{{ snapLabel }}</span>
    </button>
  </div>
</div>
