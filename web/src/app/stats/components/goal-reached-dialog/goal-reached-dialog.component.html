<div #card class="goal-card" data-testid="goal-reached-card">
  <div class="hero">
    <span aria-hidden="true" class="material-icons hero-icon">{{
      copy().icon
    }}</span>
  </div>
  <h2 id="goal-reached-dialog-title" class="title">{{ copy().title }}</h2>
  <p class="progress" data-testid="goal-reached-progress">
    {{ progressLabel() }}
    <span class="progress-suffix" i18n="@@goalReached.repsSuffix"
      >Liegestütze</span
    >
  </p>
  <p class="note">{{ copy().note }}</p>
  <div class="actions">
    <button
      type="button"
      class="snap-btn"
      data-testid="goal-reached-snap"
      [disabled]="snapping()"
      [attr.aria-label]="snapAriaLabel"
      (click)="onSnap()"
    >
      <span aria-hidden="true" class="material-icons snap-icon"
        >auto_awesome</span
      >
      <span>{{ snapLabel }}</span>
    </button>
  </div>
</div>
