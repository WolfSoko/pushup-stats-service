<h2 mat-dialog-title>
  @if (isEditMode) {
    <span i18n="@@editDialogTitle">Eintrag bearbeiten</span>
  } @else {
    <span i18n="@@trainingEntryDialog.title">Trainingseintrag anlegen</span>
  }
</h2>

<mat-dialog-content>
  <mat-form-field appearance="outline">
    <mat-label i18n="@@trainingEntryDialog.category">Kategorie</mat-label>
    <mat-select
      [value]="category()"
      (valueChange)="onCategoryChange($event)"
      [disabled]="isEditMode"
      data-testid="training-entry-category"
    >
      @for (option of categoryOptions; track option.value) {
        <mat-option [value]="option.value">{{ option.label }}</mat-option>
      }
    </mat-select>
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label i18n="@@timestampLabel">Zeitpunkt</mat-label>
    <input
      matInput
      type="datetime-local"
      [value]="timestamp()"
      (input)="timestamp.set(asValue($event))"
      required
    />
  </mat-form-field>

  @if (mode() === 'pushup') {
    <app-pushup-entry-fields [data]="data" />
  } @else {
    <app-exercise-entry-fields
      [category]="category()"
      [data]="data"
      [isEditMode]="isEditMode"
    />
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button type="button" mat-button mat-dialog-close i18n="@@cancel">
    Abbrechen
  </button>
  <button
    type="button"
    mat-flat-button
    [disabled]="!canSubmit()"
    (click)="submit()"
    i18n="@@saveEntry"
    data-testid="training-entry-submit"
  >
    Speichern
  </button>
</mat-dialog-actions>
