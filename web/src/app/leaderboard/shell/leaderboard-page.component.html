<main class="leaderboard-page">
  <mat-card>
    <mat-card-header>
      <mat-card-title i18n="@@leaderboard.page.title"
        >Bestenliste</mat-card-title
      >
      <mat-card-subtitle i18n="@@leaderboard.page.subtitle"
        >Daily · Weekly · Monthly (Alias-Namen)</mat-card-subtitle
      >
    </mat-card-header>
    <mat-card-content>
      <div
        class="period-switch"
        role="tablist"
        aria-label="Leaderboard Zeitraum"
      >
        <button
          mat-stroked-button
          type="button"
          (click)="period.set('daily')"
          [class.active]="period() === 'daily'"
          i18n="@@landing.leaderboard.daily"
        >
          Tag
        </button>
        <button
          mat-stroked-button
          type="button"
          (click)="period.set('weekly')"
          [class.active]="period() === 'weekly'"
          i18n="@@landing.leaderboard.weekly"
        >
          Woche
        </button>
        <button
          mat-stroked-button
          type="button"
          (click)="period.set('monthly')"
          [class.active]="period() === 'monthly'"
          i18n="@@landing.leaderboard.monthly"
        >
          Monat
        </button>
      </div>

      <ol>
        @for (entry of leaderboardSlots(); track entry.rank) {
          <li>
            <span class="rank">#{{ entry.rank }}</span>
            <span class="alias">{{ entry.alias }}</span>
            <strong
              >{{ entry.reps }}
              <span i18n="@@landing.leaderboard.reps">Reps</span></strong
            >
          </li>
        }
      </ol>

      @if (currentUserEntry(); as me) {
        <p class="own-rank" i18n="@@landing.leaderboard.ownPosition">
          Deine Position: #{{ me.rank }} · {{ me.reps }} Reps
        </p>
      }
    </mat-card-content>
  </mat-card>
</main>
